<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./frontend/index.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Data Mapper Explorer</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Aptos", "Segoe UI", sans-serif;
        color: #0f172a;
        background:
          radial-gradient(circle at top left, rgba(0, 120, 212, 0.16), transparent 22rem),
          radial-gradient(circle at 85% 15%, rgba(183, 121, 31, 0.18), transparent 18rem),
          linear-gradient(180deg, #f4fbff 0%, #f7fbff 35%, #fdf8f1 100%);
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 28px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        font-family: "Aptos Display", "Aptos", sans-serif;
      }

      p {
        line-height: 1.6;
        color: #475569;
      }

      a {
        display: inline-flex;
        margin-top: 12px;
        padding: 12px 18px;
        border-radius: 999px;
        background: linear-gradient(90deg, #00a4b4, #0078d4);
        color: white;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Azure Data Mapper Explorer</h1>
      <p>The public root for this deliverable redirects to the interactive frontend so the site can be published cleanly.</p>
      <a href="./frontend/index.html">Open the interactive frontend</a>
    </main>
  </body>
</html>
